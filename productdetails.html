<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            padding:20px;
        }

        img{
            width:300px;
            height:300px;
            object-fit:cover;
            border-radius:10px;
        }
.back-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}
    </style>
</head>
<body>

    <h1>Product Details</h1>

    <div id="details"></div>

    <script src="productdetails.js"></script>

</body>
</html>
